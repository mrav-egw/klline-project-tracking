apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: klline
spec:
  # MUST be 1 — running multiple beat replicas causes duplicate task execution
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: beat
          image: image-registry.openshift-image-registry.svc:5000/klline/klline-backend:latest
          command:
            - celery
            - -A
            - app.tasks.celery_app
            - beat
            - --loglevel=info
          envFrom:
            - secretRef:
                name: klline-secrets
            - configMapRef:
                name: klline-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
