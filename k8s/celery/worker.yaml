apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: klline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: worker
          image: image-registry.openshift-image-registry.svc:5000/klline/klline-backend:latest
          command:
            - celery
            - -A
            - app.tasks.celery_app
            - worker
            - --loglevel=info
            - -c
            - "4"
          envFrom:
            - secretRef:
                name: klline-secrets
            - configMapRef:
                name: klline-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
