apiVersion: v1
kind: Secret
metadata:
  name: klline-secrets
  namespace: klline
type: Opaque
stringData:
  # PostgreSQL credentials (used by postgres StatefulSet and DATABASE_URL)
  POSTGRES_USER: "klline"
  POSTGRES_PASSWORD: "changeme"
  # Full async DB URL consumed by the backend
  DATABASE_URL: "postgresql+asyncpg://klline:changeme@postgres/klline"
  # JWT signing key — generate with: python -c "import secrets; print(secrets.token_hex(32))"
  SECRET_KEY: "changeme-set-a-real-secret-here"
  # MinIO credentials
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "changeme"
