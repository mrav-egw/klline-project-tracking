apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: klline

# Apply once before this: kubectl apply -f k8s/once/

resources:
  - base/secrets.yaml
  - base/postgres.yaml
  - base/redis.yaml
  - base/minio.yaml
  - base/backend.yaml
  - base/celery.yaml
  - base/frontend.yaml
  - base/ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: klline
  app.kubernetes.io/managed-by: kustomize

# Override image tags via CI/CD:
#   kustomize edit set image klline/backend=klline/backend:v1.2.3
images:
  - name: klline/backend
    newTag: latest
  - name: klline/frontend
    newTag: latest
