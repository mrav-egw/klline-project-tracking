apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: klline

# Apply once before this: kubectl apply -f k8s/once/

resources:
- routes.yaml
- serviceaccount.yaml
- secrets.yaml
- configmap.yaml
- backend/deployment.yaml
- backend/service.yaml
- frontend/deployment.yaml
- frontend/service.yaml
- postgres/statefulset.yaml
- postgres/service.yaml
- redis/deployment.yaml
- minio/statefulset.yaml
- celery/worker.yaml
- celery/beat.yaml

images:
- name: image-registry.openshift-image-registry.svc:5000/klline/backend
  newTag: latest
- name: image-registry.openshift-image-registry.svc:5000/klline/frontend
  newTag: latest
