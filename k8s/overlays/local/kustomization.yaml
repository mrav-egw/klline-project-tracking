apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# Scale down for local/dev
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: frontend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: celery-worker

# Override image tags for local builds
images:
  - name: klline/backend
    newTag: local
  - name: klline/frontend
    newTag: local

# Override secrets for local dev
secretGenerator:
  - name: klline-secrets
    behavior: replace
    literals:
      - postgres-password=klline
      - secret-key=dev-secret-key-not-for-production
      - minio-access-key=minioadmin
      - minio-secret-key=minioadmin
