apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: klline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: klline/backend:latest
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://klline:$(POSTGRES_PASSWORD)@postgres:5432/klline
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: klline-secrets
                  key: postgres-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: klline-secrets
                  key: secret-key
      containers:
        - name: backend
          image: klline/backend:latest
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://klline:$(POSTGRES_PASSWORD)@postgres:5432/klline
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: klline-secrets
                  key: postgres-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: klline-secrets
                  key: secret-key
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: MINIO_ENDPOINT
              value: minio:9000
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: klline-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: klline-secrets
                  key: minio-secret-key
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: klline
spec:
  selector:
    app: backend
  ports:
    - port: 8000
